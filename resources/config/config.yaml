samples:
  # update your samples.txt file with the paths to R1 and R2
  'resources/config/samples.txt'

units: resources/config/units.txt

binning: resources/config/binning.txt

reads:
  - R1
  - R2

trimmer: fastp  # fastp or cutadapt

assemblers:
#  - metaspades
  - megahit

biobakery:
  - metaphlan

mappers:
  - minimap2
#  - bowtie2

binners:
  - concoct
  - metabat2
  - maxbin2

profilers:
  - kraken2
  - bracken

params:
  fastp:
    extra: ""  # fastp auto-detects adapters; add flags here to override (e.g. --disable_adapter_trimming)
  cutadapt:
    adapter: '-a GATCGGAAGAGC -a GGGGGGGGGGGGGGGGGGGG -A GATCGGAAGAGC -A GGGGGGGGGGGGGGGGGGGG'
    other: "-u 10 -U 10 --minimum-length 1 --nextseq-trim 20"
  multiqc: ''
  bowtie2:
    bt2_command: 'bowtie2'
    bt2b_command: 'bowtie2-build'
    extra: '--very-fast'
  sourmash:
    k: 31
    scaled: 1000
    extra: ''
  metaphlan:
    db_path: "/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/metaphlan"
    db_name: "mpa_vJan25_CHOCOPhlAnSGB_202503"
    other: "--add_viruses --unclassified_estimation"
  metaquast:
    reference_dir: "resources/db/metaquast/"
    extra: ''
  minimap2:
    x: 'sr'
    k: 500000000
  prototypes:
    min_seqs: 50 # recommended: 10000000
    max_seqs: 100000000
    n: 10
  metabat2:
    extra: '--verbose'
    min_contig_length: 1500 # Minimum size of a contig for binning (should be >=1500).
  maxbin2:
    prob_threshold: 0.8
    extra: ''
    min_contig_length: 1500
  concoct:
    chunk_size: 10000
    overlap_size: 0
    min_contig_length: 1500
  das_tool:
    search_engine: 'diamond'
  gtdbtk:
    db_path: "/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/gtdbtk/release232"  # set to "" and see README for download instructions on other systems
  checkm2:
    db_path: "/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/checkm2/CheckM2_database/uniref100.KO.1.dmnd"  # set to "" to auto-download; see README for instructions on other systems
  gunc:
    db_path: "/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/gunc/gunc_db_progenomes2.1.dmnd"  # set to "" to auto-download; see README for instructions on other systems
  kraken2:
    levels: 'P,C,O,F,G,S'
    db: '/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/kraken2/Kraken2_db_Standard'
    bracken-db: '/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/kraken2/Kraken2_db_Standard'

threads:
  fastqc: 1
  fastp: 8
  cutadapt_pe: 4
  host_filter: 8
  spades: 8
  metaquast: 8
  megahit: 16
  kraken2: 4
  metaphlan: 8
  bowtie2_build: 8
  map_reads: 8
  sort_bam: 8
  minimap2_index: 8
  minimap2_map_reads: 8
  concoct: 8
  run_metabat2: 8
  run_maxbin2: 8
  run_concoct: 8
  run_DAS_Tool: 8
  checkm2: 16
  gunc: 8
  gtdbtk: 16

mem_mb:
  spades: 256000
  megahit: 256000
  checkm2: 32000
  gtdbtk: 128000

host_filter:
  db_dir: "/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/bt2/human_GCA_000001405.29_GRCh38.p14"
  genome: "/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/bt2/human_GCA_000001405.29_GRCh38.p14/GCA_000001405.29_GRCh38.p14_genomic.fna"
  # db_dir: directory containing the bowtie2 index files
  # genome: full path to the host genome FASTA (bowtie2 index must have the same stem in db_dir)
  #
  # Pre-built indexes on demon (/isilon/datalake/sprockett_lab/original/WF00SprockettLab/dbs/bt2/):
  #   Human GRCh38.p14:  human_GCA_000001405.29_GRCh38.p14/GCA_000001405.29_GRCh38.p14_genomic.fna
  #
  # For test runs (mouse chr1):
  #   db_dir: resources/test/test_dbs
  #   genome: resources/test/test_dbs/GCA_000001635.9.fna
